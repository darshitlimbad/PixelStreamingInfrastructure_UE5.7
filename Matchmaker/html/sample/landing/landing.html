<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>${title}</title>

		<!-- OpenGraph meta tags for rich embed previews (Discord, Slack, etc.) -->
		<meta property="og:title" content="${title}">
		<meta property="og:description" content="${description}">
		<meta property="og:image" content="${ogImage}">
		<meta property="og:type" content="${ogType}">
		<meta name="twitter:card" content="${twitterCard}">
		<meta name="twitter:title" content="${title}">
		<meta name="twitter:description" content="${description}">
		<meta name="twitter:image" content="${ogImage}">
		<meta name="description" content="${description}">

		<link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon">
		<link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
		<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }

			body {
				background: #0a0a1a;
				color: #e0e0e0;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				overflow: hidden;
			}

			/* Subtle animated background */
			body::before {
				content: '';
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background:
					radial-gradient(ellipse at 20% 50%, rgba(74, 158, 255, 0.08) 0%, transparent 50%),
					radial-gradient(ellipse at 80% 50%, rgba(123, 97, 255, 0.06) 0%, transparent 50%);
				z-index: -1;
			}

			main {
				text-align: center;
				max-width: 560px;
				padding: 2rem;
			}

			#logo {
				width: 100px;
				margin-bottom: 2.5rem;
				opacity: 0.8;
			}

			h1 {
				font-family: 'Michroma', sans-serif;
				font-size: 1.8rem;
				margin-bottom: 1rem;
				color: #fff;
				letter-spacing: 0.02em;
			}

			p.description {
				font-size: 1rem;
				color: #999;
				margin-bottom: 2.5rem;
				line-height: 1.6;
			}

			.start-btn {
				display: inline-block;
				padding: 1rem 3rem;
				background: linear-gradient(135deg, #4a9eff, #7b61ff);
				color: #fff;
				border: none;
				border-radius: 6px;
				font-family: 'Montserrat', sans-serif;
				font-size: 1.05rem;
				font-weight: 600;
				cursor: pointer;
				text-decoration: none;
				transition: transform 0.2s, box-shadow 0.2s;
				box-shadow: 0 4px 20px rgba(74, 158, 255, 0.3);
			}

			.start-btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 6px 28px rgba(74, 158, 255, 0.45);
			}

			.start-btn:active {
				transform: translateY(0);
			}

			.footer {
				margin-top: 3rem;
				font-size: 0.75rem;
				color: #444;
			}
		</style>
	</head>
	<body>
		<main>
			<img id="logo" src="/images/ue-logo.png" alt="Unreal Engine">
			<h1>${title}</h1>
			<p class="description">${description}</p>
			<a href="/join" class="start-btn">${buttonText}</a>
			<p class="footer">Powered by Unreal Engine Pixel Streaming</p>
		</main>
	</body>
</html>
