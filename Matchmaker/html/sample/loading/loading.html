<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Preparing Your Experience...</title>
		<link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon">
		<link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
		<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Montserrat:wght@600&display=swap" rel="stylesheet">
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }

			body {
				background: #0a0a1a;
				color: #e0e0e0;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				overflow: hidden;
			}

			main {
				text-align: center;
				max-width: 500px;
				padding: 2rem;
			}

			#logo {
				width: 120px;
				margin-bottom: 2rem;
				opacity: 0.8;
			}

			h1 {
				font-family: 'Michroma', sans-serif;
				font-size: 1.4rem;
				margin-bottom: 1rem;
				color: #fff;
			}

			p {
				font-size: 0.95rem;
				color: #aaa;
				margin-bottom: 0.5rem;
			}

			/* Spinner */
			.spinner {
				width: 48px;
				height: 48px;
				margin: 2rem auto;
				border: 3px solid rgba(255, 255, 255, 0.1);
				border-top: 3px solid #4a9eff;
				border-radius: 50%;
				animation: spin 1s linear infinite;
			}

			@keyframes spin {
				to { transform: rotate(360deg); }
			}

			/* Progress bar */
			.progress-bar {
				width: 100%;
				height: 4px;
				background: rgba(255, 255, 255, 0.1);
				border-radius: 2px;
				margin: 1.5rem 0;
				overflow: hidden;
			}

			.progress-fill {
				height: 100%;
				background: linear-gradient(90deg, #4a9eff, #7b61ff);
				border-radius: 2px;
				width: 0%;
				animation: progress 25s ease-out forwards;
			}

			@keyframes progress {
				0% { width: 0%; }
				50% { width: 60%; }
				80% { width: 85%; }
				100% { width: 95%; }
			}

			#status-text {
				font-size: 0.85rem;
				color: #666;
				margin-top: 1rem;
			}

			/* Error state */
			.error-container {
				display: none;
			}

			.error-container.visible {
				display: block;
			}

			.retry-btn {
				display: inline-block;
				margin-top: 1.5rem;
				padding: 0.75rem 2rem;
				background: #4a9eff;
				color: #fff;
				border: none;
				border-radius: 4px;
				font-family: 'Montserrat', sans-serif;
				font-size: 0.9rem;
				cursor: pointer;
				text-decoration: none;
				transition: background 0.2s;
			}

			.retry-btn:hover {
				background: #3a8eef;
			}
		</style>
	</head>
	<body>
		<main>
			<img id="logo" src="/images/ue-logo.png" alt="Unreal Engine">

			<!-- Loading state -->
			<div id="loading-state">
				<h1>Preparing Your Experience</h1>
				<div class="spinner"></div>
				<p>Starting up your dedicated streaming instance...</p>
				<div class="progress-bar">
					<div class="progress-fill"></div>
				</div>
				<p id="status-text">Initializing...</p>
			</div>

			<!-- Error state (hidden by default) -->
			<div id="error-state" class="error-container">
				<h1>Something Went Wrong</h1>
				<p id="error-message">Unable to start your streaming instance.</p>
				<a href="/" class="retry-btn">Try Again</a>
			</div>
		</main>

		<script>
			(function() {
				var sessionId = '${sessionId}';
				var pollInterval = 2000;
				var maxRetries = 90;  // 90 * 2s = 3 minutes max wait
				var retryCount = 0;
				var statusEl = document.getElementById('status-text');
				var loadingState = document.getElementById('loading-state');
				var errorState = document.getElementById('error-state');
				var errorMessage = document.getElementById('error-message');

				var statusMessages = [
					'Initializing...',
					'Starting streaming server...',
					'Loading environment...',
					'Almost ready...'
				];

				function showError(msg) {
					loadingState.style.display = 'none';
					errorState.classList.add('visible');
					errorMessage.textContent = msg || 'Unable to start your streaming instance.';
				}

				function pollStatus() {
					retryCount++;

					// Update status text for visual feedback
					if (retryCount < statusMessages.length * 3) {
						var msgIndex = Math.floor(retryCount / 3);
						if (msgIndex < statusMessages.length) {
							statusEl.textContent = statusMessages[msgIndex];
						}
					}

					if (retryCount > maxRetries) {
						showError('Timed out waiting for instance to start. Please try again.');
						return;
					}

					fetch('/api/session/' + sessionId)
						.then(function(response) {
							if (response.status === 404) {
								showError('Session expired or not found.');
								return null;
							}
							return response.json();
						})
						.then(function(data) {
							if (!data) return;

							if (data.state === 'active') {
								// Instance is ready — reload to get proxied to Wilbur
								statusEl.textContent = 'Ready! Connecting...';
								window.location.reload();
							} else if (data.expired || data.state === 'expired') {
								showError('Your session has expired.');
							} else {
								// Still preparing — poll again
								setTimeout(pollStatus, pollInterval);
							}
						})
						.catch(function(err) {
							console.error('Status poll error:', err);
							// Keep trying on network errors
							setTimeout(pollStatus, pollInterval);
						});
				}

				// Start polling after a short delay
				setTimeout(pollStatus, pollInterval);
			})();
		</script>
	</body>
</html>
